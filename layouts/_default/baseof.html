<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
  <script async src="https://assets.endorsely.com/endorsely.js" data-endorsely="e23cf210-2049-4287-a0f6-b50be34d0a68"></script>
</head>
<body>
  {{ partial "header.html" . }}
  <main id="page">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
    // Mobile menu toggle
    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.querySelector('.mobile-menu-toggle');
      const mobileNav = document.querySelector('.mobile-nav');
      if (toggle && mobileNav) {
        toggle.addEventListener('click', function() {
          const expanded = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', !expanded);
          this.classList.toggle('active');
          mobileNav.classList.toggle('open');
          mobileNav.setAttribute('aria-hidden', expanded);
        });
      }

      // FAQ accordions
      document.querySelectorAll('.faq-question').forEach(function(btn) {
        btn.addEventListener('click', function() {
          const item = this.closest('.faq-item');
          const isOpen = item.classList.contains('open');
          item.closest('.faq-list').querySelectorAll('.faq-item').forEach(function(i) {
            i.classList.remove('open');
          });
          if (!isOpen) item.classList.add('open');
        });
      });

      // Scroll reveal
      const observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.reveal').forEach(function(el) {
        observer.observe(el);
      });
    });
  </script>
</body>
</html>
