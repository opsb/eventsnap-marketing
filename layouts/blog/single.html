{{ define "main" }}
<article class="page-single blog-post">
<section class="section bg-white">
  <div class="container">
    <div class="blog-post-header reveal">
      <h1 class="section-title">{{ .Title }}</h1>
    </div>
    {{ with .Params.image }}
    <div class="blog-post-hero reveal">
      <img src="{{ . }}" alt="{{ $.Title }}">
    </div>
    {{ end }}
    <div class="blog-post-content prose">
      {{ .Content }}
    </div>
    <div class="blog-post-back">
      <a href="{{ "blog/" | relLangURL }}" class="btn btn-outline">{{ i18n "see_more_articles" }}</a>
    </div>
  </div>
</section>
</article>
{{ end }}
