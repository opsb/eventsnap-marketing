{{ define "main" }}
<article class="page-single">

<!-- Contact Form -->
<section class="section bg-white">
  <div class="container">
    <div class="contact-layout">
      <div class="contact-info reveal">
        <h1 class="section-title">Let's Make Wedding Magic Happen!</h1>
        <p>Before reaching out, check out our <a href="{{ "pricing/#faq" | relURL }}">FAQs</a> &mdash; your answer might already be there! If you still need assistance, drop us a message, and we'll get back to you as soon as possible.</p>
      </div>
      <div class="contact-form-wrap reveal">
        <form class="contact-form" action="#" method="POST">
          <div class="form-row form-row--half">
            <div class="form-group">
              <label for="first-name">First Name <span class="required">*</span></label>
              <input type="text" id="first-name" name="first_name" required>
            </div>
            <div class="form-group">
              <label for="last-name">Last Name <span class="required">*</span></label>
              <input type="text" id="last-name" name="last_name" required>
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group form-group--checkbox">
            <label>
              <input type="checkbox" name="subscribe">
              <span>Sign up for news and updates</span>
            </label>
          </div>
          <div class="form-group">
            <label for="subject">Subject <span class="required">*</span></label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div class="form-group">
            <label for="message">Message <span class="required">*</span></label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
          <div style="position:absolute;left:-9999px;"><input type="text" name="honeypot" tabindex="-1" autocomplete="off"></div>
          <button type="submit" class="btn btn-filled btn-full">Submit</button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="section contact-cta">
  <div class="container text-center">
    <h2 class="section-title reveal">Capture Every Moment, Relive Every Memory</h2>
    <a href="{{ "pricing/" | relURL }}" class="btn btn-outline reveal">Sign up</a>
  </div>
</section>

</article>
{{ end }}
