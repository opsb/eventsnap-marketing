<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo" aria-label="EventSnap home">
      <img src="/images/logo.webp" alt="EventSnap" class="logo-img">
    </a>
    <nav class="main-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
      <a href="{{ .Site.Params.appURL }}/signin" class="nav-link nav-login">Login</a>
    </nav>
    <a href="/pricing/" class="btn btn-outline header-cta">Get started</a>
    <button class="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>
  <div class="mobile-nav" aria-hidden="true">
    <nav>
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="mobile-nav-link">{{ .Name }}</a>
      {{ end }}
      <a href="{{ .Site.Params.appURL }}/signin" class="mobile-nav-link">Login</a>
      <a href="/pricing/" class="btn btn-outline mobile-cta">Get started</a>
    </nav>
  </div>
</header>
