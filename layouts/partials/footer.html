<footer class="site-footer">

    <a href="{{ "" | relURL }}" class="footer-logo" aria-label="EventSnap home">
      <img src="{{ "images/logo.webp" | relURL }}" alt="EventSnap" class="logo-img">
    </a>
    <div class="footer-links">
      {{ range .Site.Menus.footer }}
        <a href="{{ .URL }}">{{ .Name }}</a>
