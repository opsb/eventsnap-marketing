# ─── FAQ ─────────────────────────────────────────────────
[faq1_q]
other = "Hogyan kezdhetek el az EventSnap-pel?"
[faq1_a]
other = "Egyszerűen regisztrálj, hozd létre az eseményedet, és oszd meg az egyedi QR-kódodat vagy privát linkedet a vendégeiddel. Azonnal elkezdhetik feltölteni a fotóikat, videóikat és üzeneteiket!"
[faq2_q]
other = "Feltölthetnek a vendégek fotókat és videókat az esemény alatt?"
[faq2_a]
other = "Igen! A vendégek valós időben tölthetnek fel fotókat és videókat a telefonjukról, így egyetlen pillanat sem marad ki."
[faq3_q]
other = "Meghívhatnak a vendégek másokat is fotók és videók feltöltésére?"
[faq3_a]
other = "Természetesen! A vendégeid meghívhatnak más esküvői résztvevőket is a galériába, így közösen gyűjtik az emlékeket, és biztosan nem marad ki egyetlen nagyszerű pillanat sem."
[faq4_q]
other = "Mennyi ideig férhetek hozzá a fotókhoz és videókhoz?"
[faq4_a]
other = "12 hónapig férhetsz hozzá a fotóidhoz és videóidhoz, nézheted és töltheted le őket. Ezen időszak alatt bármikor letöltheted az anyagokat."
[faq5_q]
other = "Letölthetem az esküvői fotókat és videókat nagy felbontásban?"
[faq5_a]
other = "Igen! Egyetlen kattintással letöltheted az összes fotót, videót és vendégkönyvi üzenetet teljes felbontásban, így örökre megőrizheted az emlékeidet."
[faq6_q]
other = "Privát az esemény galériám?"
[faq6_a]
other = "Igen, a galériád privát, és csak a vendégeiddel megosztott QR-kódon vagy privát linken keresztül érhető el. Teljes mértékben te irányítod, ki láthatja és oszthatja meg a galériát."
[faq7_q]
other = "Használhatom az EventSnap-et esküvőn kívül más eseményekre is?"
[faq7_a]
other = "Igen! Az EventSnap tökéletes bármilyen típusú eseményhez, beleértve a születésnapokat, céges rendezvényeket, ünnepségeket, találkozókat és még sok mást. Bármely alkalom emlékeinek megörökítésére és rendszerezésére terveztük."
[faq8_q]
other = "Megoszthatom az esküvői galériát azokkal, akik nem tudtak részt venni?"
[faq8_a]
other = "Igen! Egyszerűen megoszthatod a linket vagy QR-kódot bárkivel, így azok is élvezhetik az emlékeket, akik nem tudtak jelen lenni az eseményen."

