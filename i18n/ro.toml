# ─── FAQ ─────────────────────────────────────────────────
[faq1_q]
other = "Cum incep sa folosesc EventSnap?"
[faq1_a]
other = "Pur si simplu creeaza-ti un cont, creeaza evenimentul si distribuie codul QR unic sau link-ul privat invitatilor tai. Ei pot incepe sa incarce fotografii, videoclipuri si mesaje imediat!"
[faq2_q]
other = "Pot invitatii sa incarce fotografii si videoclipuri in timpul evenimentului?"
[faq2_a]
other = "Da! Invitatii pot incarca fotografii si videoclipuri de pe telefoanele lor in timp real, ca sa nu ratezi niciun moment."
[faq3_q]
other = "Pot invitatii sa invite si alte persoane sa contribuie cu fotografii si videoclipuri?"
[faq3_a]
other = "Absolut! Invitatii tai pot invita alti participanti la nunta sa contribuie la galerie, creand o experienta colaborativa si asigurandu-se ca toate momentele speciale sunt surprinse."
[faq4_q]
other = "Cat timp am acces la fotografii si videoclipuri?"
[faq4_a]
other = "Vei avea 12 luni pentru a accesa, descarca si revedea fotografiile si videoclipurile tale. Le poti descarca oricand in aceasta perioada."
[faq5_q]
other = "Pot descarca fotografiile si videoclipurile de nunta la rezolutie maxima?"
[faq5_a]
other = "Da! Poti descarca toate fotografiile, videoclipurile si mesajele din cartea de oaspeti la rezolutie maxima cu un singur click, asigurandu-te ca iti pastrezi amintirile pentru totdeauna."
[faq6_q]
other = "Este galeria mea privata?"
[faq6_a]
other = "Da, galeria ta este privata si accesibila doar prin codul QR sau link-ul privat pe care il distribui invitatilor tai. Ai control total asupra cine vede si distribuie galeria."
[faq7_q]
other = "Pot folosi EventSnap si pentru alte evenimente, nu doar nunti?"
[faq7_a]
other = "Da! EventSnap este perfect pentru orice tip de eveniment, inclusiv aniversari, evenimente corporate, sarbatori, reuniuni si multe altele. Este conceput pentru a surprinde si organiza amintiri pentru orice ocazie."
[faq8_q]
other = "Pot distribui galeria de nunta cu persoane care nu au putut participa?"
[faq8_a]
other = "Da! Poti distribui usor link-ul sau codul QR oricui, asa ca si cei care nu au putut ajunge la eveniment se pot bucura de amintiri."

