# ─── FAQ ─────────────────────────────────────────────────
[faq1_q]
other = "How do I set up Posy for my wedding?"
[faq1_a]
other = "Sign up, create your wedding album, and share your unique QR code or private link with your guests. They can start uploading their photos, videos, and messages right away."
[faq2_q]
other = "Can guests upload photos and videos during the event?"
[faq2_a]
other = "Yes! Guests can upload photos and videos from their phones in real-time, so you won't miss a moment."
[faq3_q]
other = "Can guests invite others to contribute photos and videos?"
[faq3_a]
other = "Absolutely! Your guests can invite other wedding attendees to contribute to the gallery, creating a collaborative experience and ensuring you get all the great moments captured."
[faq4_q]
other = "How long do I have access to the photos and videos?"
[faq4_a]
other = "You'll have 12 months to access, download, and relive your photos and videos. You can also download them at any time during this period."
[faq5_q]
other = "Can I download the wedding photos and videos in high resolution?"
[faq5_a]
other = "Yes! You can download all the photos, videos, and guestbook messages in full resolution with just one click, ensuring you keep your memories forever."
[faq6_q]
other = "Is my event gallery private?"
[faq6_a]
other = "Yes, your gallery is private and only accessible via the QR code or private link that you share with your guests. You have full control over who sees and shares the gallery."
[faq7_q]
other = "Can I use Posy for events other than weddings?"
[faq7_a]
other = "Yes! Posy works beautifully for birthdays, reunions, holidays, and any gathering worth remembering. It's designed to hold every kind of celebration close."
[faq8_q]
other = "Can I share my wedding gallery with people who couldn't attend?"
[faq8_a]
other = "Yes! You can easily share the link or QR code with anyone, so even those who couldn't make it to the event can still enjoy the memories."

