# ─── FAQ ─────────────────────────────────────────────────
[faq1_q]
other = "Come posso iniziare a usare Posy?"
[faq1_a]
other = "Basta registrarsi, creare il proprio evento e condividere il codice QR o il link privato con gli ospiti. Potranno iniziare subito a caricare foto, video e messaggi!"
[faq2_q]
other = "Gli ospiti possono caricare foto e video durante l'evento?"
[faq2_a]
other = "Sì! Gli ospiti possono caricare foto e video dai loro telefoni in tempo reale, così non perderai nemmeno un momento."
[faq3_q]
other = "Gli ospiti possono invitare altre persone a contribuire con foto e video?"
[faq3_a]
other = "Certamente! I tuoi ospiti possono invitare altri partecipanti al matrimonio a contribuire alla galleria, creando un'esperienza collaborativa e assicurandoti di ottenere tutti i momenti più belli."
[faq4_q]
other = "Per quanto tempo posso accedere alle foto e ai video?"
[faq4_a]
other = "Avrai 12 mesi di tempo per accedere, scaricare e rivivere le tue foto e i tuoi video. Puoi anche scaricarli in qualsiasi momento durante questo periodo."
[faq5_q]
other = "Posso scaricare le foto e i video del matrimonio in alta risoluzione?"
[faq5_a]
other = "Sì! Puoi scaricare tutte le foto, i video e i messaggi del guestbook in alta risoluzione con un solo clic, assicurandoti di conservare i tuoi ricordi per sempre."
[faq6_q]
other = "La galleria del mio evento è privata?"
[faq6_a]
other = "Sì, la tua galleria è privata e accessibile solo tramite il codice QR o il link privato che condividi con i tuoi ospiti. Hai il pieno controllo su chi può vedere e condividere la galleria."
[faq7_q]
other = "Posso usare Posy per eventi diversi dai matrimoni?"
[faq7_a]
other = "Sì! Posy funziona meravigliosamente per compleanni, riunioni, feste e qualsiasi celebrazione che vale la pena ricordare."
[faq8_q]
other = "Posso condividere la galleria del matrimonio con chi non ha potuto partecipare?"
[faq8_a]
other = "Sì! Puoi facilmente condividere il link o il codice QR con chiunque, così anche chi non è potuto venire all'evento potrà rivivere i ricordi."

