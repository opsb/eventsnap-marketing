# ─── FAQ ─────────────────────────────────────────────────
[faq1_q]
other = "Wie starte ich mit Posy?"
[faq1_a]
other = "Registriere dich einfach, erstelle dein Event und teile deinen einzigartigen QR-Code oder privaten Link mit deinen Gästen. Sie können sofort Fotos, Videos und Nachrichten hochladen!"
[faq2_q]
other = "Können Gäste während der Veranstaltung Fotos und Videos hochladen?"
[faq2_a]
other = "Ja! Gäste können Fotos und Videos in Echtzeit von ihren Handys hochladen, damit du keinen Moment verpasst."
[faq3_q]
other = "Können Gäste andere einladen, Fotos und Videos beizusteuern?"
[faq3_a]
other = "Auf jeden Fall! Deine Gäste können andere Hochzeitsgäste einladen, zur Galerie beizutragen. So entsteht ein gemeinsames Erlebnis und es wird sichergestellt, dass alle tollen Momente festgehalten werden."
[faq4_q]
other = "Wie lange habe ich Zugriff auf die Fotos und Videos?"
[faq4_a]
other = "Du hast 12 Monate Zugriff, um deine Fotos und Videos herunterzuladen und immer wieder anzuschauen. Du kannst sie jederzeit in diesem Zeitraum herunterladen."
[faq5_q]
other = "Kann ich die Hochzeitsfotos und -videos in hoher Auflösung herunterladen?"
[faq5_a]
other = "Ja! Du kannst alle Fotos, Videos und Gästebuch-Nachrichten in voller Auflösung mit nur einem Klick herunterladen und deine Erinnerungen für immer bewahren."
[faq6_q]
other = "Ist meine Event-Galerie privat?"
[faq6_a]
other = "Ja, deine Galerie ist privat und nur über den QR-Code oder den privaten Link zugänglich, den du mit deinen Gästen teilst. Du hast die volle Kontrolle darüber, wer die Galerie sehen und teilen kann."
[faq7_q]
other = "Kann ich Posy auch für andere Events als Hochzeiten nutzen?"
[faq7_a]
other = "Ja! Posy eignet sich wunderbar für Geburtstage, Wiedersehen, Feiertage und jede Feier, die es wert ist, festgehalten zu werden."
[faq8_q]
other = "Kann ich meine Hochzeitsgalerie mit Personen teilen, die nicht dabei sein konnten?"
[faq8_a]
other = "Ja! Du kannst den Link oder QR-Code ganz einfach mit jedem teilen, sodass auch diejenigen, die nicht beim Event dabei sein konnten, die Erinnerungen genießen können."

