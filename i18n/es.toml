# ─── FAQ ─────────────────────────────────────────────────
[faq1_q]
other = "¿Cómo empiezo a usar EventSnap?"
[faq1_a]
other = "Simplemente regístrate, crea tu evento y comparte tu código QR único o enlace privado con tus invitados. ¡Podrán empezar a subir fotos, vídeos y mensajes de inmediato!"
[faq2_q]
other = "¿Pueden los invitados subir fotos y vídeos durante el evento?"
[faq2_a]
other = "¡Sí! Los invitados pueden subir fotos y vídeos desde sus teléfonos en tiempo real, para que no te pierdas ni un momento."
[faq3_q]
other = "¿Pueden los invitados invitar a otros a compartir fotos y vídeos?"
[faq3_a]
other = "¡Por supuesto! Tus invitados pueden invitar a otros asistentes a contribuir a la galería, creando una experiencia colaborativa y asegurando que se capturen todos los grandes momentos."
[faq4_q]
other = "¿Durante cuánto tiempo tengo acceso a las fotos y vídeos?"
[faq4_a]
other = "Tendrás 12 meses para acceder, descargar y revivir tus fotos y vídeos. También puedes descargarlos en cualquier momento durante este período."
[faq5_q]
other = "¿Puedo descargar las fotos y vídeos de la boda en alta resolución?"
[faq5_a]
other = "¡Sí! Puedes descargar todas las fotos, vídeos y mensajes del libro de firmas en resolución completa con un solo clic, asegurándote de conservar tus recuerdos para siempre."
[faq6_q]
other = "¿Mi galería del evento es privada?"
[faq6_a]
other = "Sí, tu galería es privada y solo se puede acceder a ella mediante el código QR o el enlace privado que compartas con tus invitados. Tienes control total sobre quién ve y comparte la galería."
[faq7_q]
other = "¿Puedo usar EventSnap para eventos que no sean bodas?"
[faq7_a]
other = "¡Sí! EventSnap es perfecto para cualquier tipo de evento, incluyendo cumpleaños, eventos corporativos, fiestas, reuniones y más. Está diseñado para capturar y organizar recuerdos de cualquier ocasión."
[faq8_q]
other = "¿Puedo compartir la galería de mi boda con personas que no pudieron asistir?"
[faq8_a]
other = "¡Sí! Puedes compartir fácilmente el enlace o el código QR con cualquier persona, para que incluso quienes no pudieron asistir al evento puedan disfrutar de los recuerdos."

