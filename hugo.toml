baseURL = 'https://eventsnap.it/'
title = 'EventSnap'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = 'Capture Moments Today'
  appURL = 'https://app.eventsnap.it'
  instagramURL = 'https://www.instagram.com/eventsnap.it'
  tiktokURL = 'https://www.tiktok.com/@thebrideclub1'

# ─── Languages ───────────────────────────────────────────

[languages]

  [languages.en]
    languageCode = 'en-us'
    languageName = 'English'
    weight = 1
    [languages.en.params]
      languageFlag = '🇬🇧'

    [[languages.en.menus.main]]
